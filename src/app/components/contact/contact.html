<section id="contact" class="contact-section">
  <div class="container">
    <div class="contact-glass glass-panel animate-fade-in">
      <h2 class="section-title">Hablemos sobre el <span class="gradient-text">Futuro</span></h2>
      <p class="contact-subtitle">
        ¿Tienes algún desafío técnico o buscas un arquitecto para tu próximo gran proyecto? Estoy disponible para conectar.
      </p>

      <div class="contact-grid">
        <!-- Información de Contacto Directa -->
        <div class="contact-info-col">
          <div class="info-card glass-card">
            <i class='bx bxs-envelope'></i>
            <h4>Email</h4>
            <a href="mailto:jorge@hotmail.com">jorge&#64;hotmail.com</a>
          </div>
          
          <div class="info-card glass-card">
            <i class='bx bxs-phone'></i>
            <h4>Teléfono</h4>
            <a href="tel:697107484">697 107 484</a>
          </div>

          <div class="footer-socials">
            <a href="https://www.linkedin.com/in/jorge-uriel-cruz-lara-327bb9159/" target="_blank" rel="noopener noreferrer" class="social-circle">
              <i class='bx bxl-linkedin'></i>
            </a>
            <a href="https://github.com/JorgeCruz24" target="_blank" rel="noopener noreferrer" class="social-circle">
              <i class='bx bxl-github'></i>
            </a>
          </div>
        </div>

        <!-- Formulario de Contacto -->
        <div class="contact-form-col">
          <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="glass-form">
            <div class="form-group">
              <label for="name">Nombre</label>
              <input type="text" id="name" formControlName="name" placeholder="Tu nombre completo"
                [class.invalid]="contactForm.get('name')?.invalid && contactForm.get('name')?.touched">
            </div>

            <div class="form-group">
              <label for="email">Correo Electrónico</label>
              <input type="email" id="email" formControlName="email" placeholder="tucorreo@ejemplo.com"
              [class.invalid]="contactForm.get('email')?.invalid && contactForm.get('email')?.touched">
            </div>

            <div class="form-group">
              <label for="message">Mensaje</label>
              <textarea id="message" formControlName="message" rows="4" placeholder="¿En qué te puedo ayudar?"
              [class.invalid]="contactForm.get('message')?.invalid && contactForm.get('message')?.touched"></textarea>
            </div>

            <button type="submit" class="btn btn-primary submit-btn" [disabled]="isSubmitting">
              <span *ngIf="!isSubmitting"><i class='bx bx-send'></i> Enviar Mensaje</span>
              <span *ngIf="isSubmitting"><i class='bx bx-loader-alt bx-spin'></i> Enviando...</span>
            </button>

            <!-- Mensaje de Éxito -->
            <div class="success-msg" *ngIf="submitSuccess">
              <i class='bx bxs-check-circle'></i> ¡Mensaje enviado con éxito! Te contactaré pronto.
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  
  <footer class="contact-footer">
    <p>&copy; 2026 Jorge Cruz. Arquitecto de Software.</p>
  </footer>
</section>
